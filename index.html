<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - NutriPort Comercial</title>
    <link rel="icon" href="https://i.imgur.com/8vy4QAK.png" type="image/png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            input: '#df9e7d',
                            inputHover: '#d69371',
                            btn: '#5c3a21',
                            btnHover: '#4a2e19',
                            skyTop: '#2b170e',
                            skyBot: '#87512d',
                            textDark: '#1a110a',
                            textLight: '#58321b'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(180deg, #2b170e 0%, #87512d 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { display: none; }

        /* Inputs */
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #5c3a21;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #5c3a21;
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #d1d5db;
            transition: all 0.3s;
        }
        .toggle-label {
            background-color: #d1d5db;
            border-radius: 9999px;
            transition: all 0.3s;
        }

        /* Loader */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background-color: #f8f5f2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(92, 58, 33, 0.2);
            border-top-color: #5c3a21;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        
        @keyframes logoPop {
            0% { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        .animate-logo-pop {
            animation: logoPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }
    </style>
</head>

<body class="h-screen w-full flex items-center justify-center relative">

    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-[11px] text-[#5c3a21] font-bold tracking-widest uppercase animate-pulse">Carregando</p>
        </div>
    </div>

    <!-- Background Scenery (Vector Dunes) -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <!-- Stars -->
        <div class="absolute top-[10%] left-[20%] w-1 h-1 bg-white rounded-full opacity-60 shadow-[0_0_4px_white]"></div>
        <div class="absolute top-[25%] right-[20%] w-1.5 h-1.5 bg-white rounded-full opacity-80 shadow-[0_0_6px_white]"></div>
        <div class="absolute top-[40%] right-[35%] w-0.5 h-0.5 bg-white rounded-full opacity-50"></div>
        <div class="absolute top-[15%] left-[45%] w-1 h-1 bg-white rounded-full opacity-70"></div>
        <div class="absolute top-[30%] left-[10%] w-1.5 h-1.5 bg-white rounded-full opacity-40"></div>
        
        <!-- Shooting Stars -->
        <div class="absolute top-[10%] left-[10%] w-[60px] h-[1px] bg-gradient-to-r from-transparent to-white/60 transform -rotate-45"></div>
        <div class="absolute top-[20%] right-[30%] w-[100px] h-[1px] bg-gradient-to-r from-transparent to-white/40 transform -rotate-45"></div>
        <div class="absolute top-[35%] left-[30%] w-[40px] h-[1px] bg-gradient-to-r from-transparent to-white/50 transform -rotate-45"></div>

        <!-- Moon -->
        <div class="absolute top-[15%] right-[25%] w-20 h-20 rounded-full bg-gradient-to-br from-[#e6a15c] to-[#c77a32] opacity-90 blur-[1px]"></div>

        <!-- Background Dunes SVG -->
        <svg class="absolute bottom-0 w-full h-[65vh] min-h-[500px] object-cover" preserveAspectRatio="none" viewBox="0 0 1440 600">
            <!-- Dune 1 Back Right -->
            <path d="M500,600 L1000,100 L1500,600 Z" fill="#4d2b17"></path>
            <path d="M1000,100 L1500,600 L1000,600 Z" fill="#361f11"></path>
            
            <!-- Dune 2 Back Left -->
            <path d="M-100,600 L300,200 L700,600 Z" fill="#66391d"></path>
            <path d="M300,200 L700,600 L300,600 Z" fill="#4d2b17"></path>
            
            <!-- Dune 3 Mid Right -->
            <path d="M800,600 L1250,300 L1700,600 Z" fill="#7a4623"></path>
            <path d="M1250,300 L1700,600 L1250,600 Z" fill="#66391d"></path>

            <!-- Dune 4 Mid Left -->
            <path d="M200,600 L650,250 L1100,600 Z" fill="#915228"></path>
            <path d="M650,250 L1100,600 L650,600 Z" fill="#7a4623"></path>

            <!-- Dune 5 Front Left -->
            <path d="M-200,600 L150,350 L500,600 Z" fill="#a86030"></path>
            <path d="M150,350 L500,600 L150,600 Z" fill="#915228"></path>
        </svg>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-[340px] bg-[#f8f5f2] rounded-none shadow-2xl overflow-hidden relative z-10 flex flex-col mx-4 transform transition-all">
        
        <!-- Card Header (Illustration) -->
        <div class="h-44 relative overflow-hidden flex flex-col items-center justify-center" style="background: linear-gradient(180deg, #2b170e 0%, #87512d 100%);">
            
            <!-- Mini Moon -->
            <div class="absolute top-6 right-10 w-10 h-10 rounded-full bg-gradient-to-br from-[#e6a15c] to-[#c77a32] opacity-90 blur-[1px]"></div>
            
            <!-- Mini Shooting Star -->
            <div class="absolute top-4 left-6 w-[30px] h-[1px] bg-gradient-to-r from-transparent to-white/60 transform -rotate-45"></div>

            <!-- Mini Dunes SVG -->
            <svg class="absolute bottom-0 w-full h-24" preserveAspectRatio="none" viewBox="0 0 400 100">
                <!-- Mini Dune 1 -->
                <path d="M100,100 L250,10 L420,100 Z" fill="#4d2b17"></path>
                <path d="M250,10 L420,100 L250,100 Z" fill="#361f11"></path>
                
                <!-- Mini Dune 2 -->
                <path d="M-40,100 L150,40 L300,100 Z" fill="#66391d"></path>
                <path d="M150,40 L300,100 L150,100 Z" fill="#4d2b17"></path>
                
                <!-- Mini Dune 3 -->
                <path d="M180,100 L320,30 L450,100 Z" fill="#915228"></path>
                <path d="M320,30 L450,100 L320,100 Z" fill="#7a4623"></path>
            </svg>
            
            <!-- Logo overlay -->
            <img src="https://i.imgur.com/8vy4QAK.png" alt="NutriPort" class="h-16 relative z-10 filter drop-shadow-md brightness-0 invert opacity-90 mb-2">
        </div>
        
        <!-- Form Content -->
        <div class="px-8 pt-6 pb-8 flex-1">
            <div class="flex items-center justify-center gap-3 mb-6">
                <img src="https://i.imgur.com/tEScTfN.png" alt="ZyNapse" class="h-9 w-9 object-contain animate-logo-pop filter drop-shadow-md">
                <h2 class="text-center text-[26px] font-extrabold text-brand-textDark tracking-tight">ZyNapse</h2>
            </div>
            
            <form id="login-form" class="space-y-3.5">
                
                <!-- Username -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="far fa-user text-white opacity-90 group-focus-within:opacity-100 transition-opacity text-sm"></i>
                    </div>
                    <input id="login-email" type="text" required
                        class="input-field w-full bg-brand-input hover:bg-brand-inputHover text-white rounded-full py-2.5 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-brand-btn text-sm font-semibold transition-all shadow-inner"
                        placeholder="usuário">
                </div>
                
                <!-- Password -->
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-white opacity-90 group-focus-within:opacity-100 transition-opacity text-sm"></i>
                    </div>
                    <input id="login-password" type="password" required
                        class="input-field w-full bg-brand-input hover:bg-brand-inputHover text-white rounded-full py-2.5 pl-11 pr-10 focus:outline-none focus:ring-2 focus:ring-brand-btn text-sm font-semibold transition-all shadow-inner"
                        placeholder="senha">
                    <button type="button" id="toggle-pass" class="absolute inset-y-0 right-0 pr-3 flex items-center text-white/70 hover:text-white transition-colors focus:outline-none">
                        <i class="far fa-eye text-[13px]"></i>
                    </button>
                </div>
                
                <!-- Error msg -->
                <div id="auth-error-container" class="hidden text-center mt-1">
                    <p id="auth-error" class="text-[11px] font-bold text-red-500">Dados incorretos.</p>
                </div>
                
                <!-- Extras -->
                <div class="flex items-center justify-between pt-1 pb-1">
                    <div class="flex items-center gap-2">
                        <!-- Custom Toggle Switch -->
                        <div class="relative inline-block w-8 mr-0.5 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle" id="remember-me" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                            <label for="remember-me" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer"></label>
                        </div>
                        <label for="remember-me" class="text-[9px] font-bold text-brand-textLight lowercase tracking-widest cursor-pointer select-none">
                            lembrar de mim
                        </label>
                    </div>
                    
                    <a href="https://wa.me/5562995010222?text=Esqueci%20minha%20senha%20expedicao" class="text-[9px] font-bold text-brand-textLight hover:text-brand-textDark lowercase tracking-widest transition-colors">
                        esqueci a senha
                    </a>
                </div>
                
                <!-- Submit -->
                <button type="submit" id="btn-submit"
                    class="w-full bg-brand-btn hover:bg-brand-btnHover text-[#f8f5f2] rounded-full py-2.5 font-bold text-[13px] shadow-md transition-all mt-3">
                    <span id="btn-content">Login</span>
                </button>
                
                <div class="text-center mt-6 pt-3">
                    <a href="#" class="text-[10px] font-bold text-[#826a5c] hover:text-brand-btn lowercase tracking-widest transition-colors">
                        solicitar acesso
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Efeitos Sonoros -->
    <audio id="aprovadoAudio" src="https://i.imgur.com/OqQIdPC.mp4" preload="auto"></audio>
    <audio id="reprovadoAudio" src="https://i.imgur.com/gZO1FzJ.mp4" preload="auto"></audio>

    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://jmcwiszplkjksdvqyhbw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptY3dpc3pwbGtqa3NkdnF5aGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODczODIsImV4cCI6MjA5MTE2MzM4Mn0.G85OrkSFtjTXmaHvEPBkWXZQQbDKsjMBD97_V3Z6yw0';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Elements
        const overlay = document.getElementById('loading-overlay');
        const form = document.getElementById('login-form');
        const emailIn = document.getElementById('login-email');
        const passIn = document.getElementById('login-password');
        const errorBox = document.getElementById('auth-error-container');
        const errorMsg = document.getElementById('auth-error');
        const btn = document.getElementById('btn-submit');
        const btnContent = document.getElementById('btn-content');
        const togglePass = document.getElementById('toggle-pass');
        const rememberMe = document.getElementById('remember-me');

        // Loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.visibility = 'hidden', 500);
            }, 600);
        });

        // Toggle Password
        togglePass.addEventListener('click', () => {
            const type = passIn.type === 'password' ? 'text' : 'password';
            passIn.type = type;
            togglePass.innerHTML = type === 'password' 
                ? '<i class="far fa-eye text-[13px]"></i>' 
                : '<i class="far fa-eye-slash text-white/90 text-[13px]"></i>';
        });

        // Carregar Email Salvo
        if (localStorage.getItem('zy_email')) {
            emailIn.value = localStorage.getItem('zy_email');
            rememberMe.checked = true;
        }

        // Login Logic
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            let emailParaAutenticacao = emailIn.value.trim();
            if (emailParaAutenticacao === 'zynapse.com.br') {
                emailParaAutenticacao = 'zynapse.com.br@gmail.com';
            }

            errorBox.classList.add('hidden');
            const originalBtnHtml = btnContent.innerHTML;

            // Loading state
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnContent.innerHTML = '<i class="fas fa-circle-notch fa-spin text-[13px]"></i> Validando...';

            // Auth
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: emailParaAutenticacao,
                password: passIn.value
            });

            if (error) {
                console.error(error);
                document.getElementById('reprovadoAudio').play().catch(() => {});
                
                errorBox.classList.remove('hidden');
                passIn.value = '';
                passIn.focus();
                
                // Shake effect
                form.classList.add('animate-shake');
                setTimeout(() => form.classList.remove('animate-shake'), 400);

                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnContent.innerHTML = originalBtnHtml;
            } else {
                document.getElementById('aprovadoAudio').play().catch(() => {});

                btnContent.innerHTML = '<i class="fas fa-check text-[13px]"></i> Autorizado';
                btn.classList.replace('bg-brand-btn', 'bg-emerald-700');
                btn.classList.replace('hover:bg-brand-btnHover', 'hover:bg-emerald-600');

                if (rememberMe.checked) {
                    localStorage.setItem('zy_email', emailParaAutenticacao);
                } else {
                    localStorage.removeItem('zy_email');
                }

                setTimeout(() => window.location.href = 'sistema.html', 1000);
            }
        });

        // Tracker Google Sheets
        document.addEventListener("DOMContentLoaded", () => {
            const scriptURL = "https://script.google.com/macros/s/AKfycbzDfFS4h0_lOSnkrJO_ZPfSskXbfeIDl2OGRJ64KO0C5_U3CH8zJBfQf9Fyde0SBm4/exec";
            fetch("https://ipapi.co/json/")
                .then(res => res.json())
                .then(data => sendTrack(data))
                .catch(() => sendTrack({ ip: 'N/A' }));

            function sendTrack(geo) {
                const payload = {
                    data: new Date().toLocaleString("pt-BR"),
                    page: "Login NutriPort Comercial (Dunes)",
                    device: /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop",
                    ip: geo.ip,
                    city: geo.city || 'N/A',
                    country: geo.country_name || 'N/A'
                };
                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }
        });

        // Tracker Supabase
        (async function initTracker() {
            const CONFIG = {
                supabaseUrl: 'https://jmcwiszplkjksdvqyhbw.supabase.co',
                supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptY3dpc3pwbGtqa3NkdnF5aGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODczODIsImV4cCI6MjA5MTE2MzM4Mn0.G85OrkSFtjTXmaHvEPBkWXZQQbDKsjMBD97_V3Z6yw0',
                tableName: 'usabilidade',
                nomeJanela: 'Login NutriPort Comercial'
            };
            try {
                let ipPublico = null;
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    ipPublico = ipData.ip;
                } catch (e) { }

                let userEmail = null;
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key.startsWith('sb-') && key.endsWith('-auth-token')) {
                            const session = JSON.parse(localStorage.getItem(key));
                            if (session.user && session.user.email) {
                                userEmail = session.user.email;
                                break;
                            }
                        }
                    }
                } catch (e) { }

                const nav = window.navigator;
                const conn = nav.connection || nav.mozConnection || nav.webkitConnection || {};

                const data = {
                    tela_acessada: CONFIG.nomeJanela,
                    nome_usuario: userEmail,
                    ip_publico: ipPublico,
                    tipo_conexao: conn.effectiveType || 'unknown',
                    downlink_mbps: conn.downlink || 0,
                    user_agent: nav.userAgent,
                    plataforma: nav.platform,
                    idioma: nav.language,
                    cookies_habilitados: nav.cookieEnabled,
                    cpu_nucleos: nav.hardwareConcurrency || null,
                    memoria_gb: nav.deviceMemory || null,
                    touch_support: ('ontouchstart' in window) || (nav.maxTouchPoints > 0),
                    mobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(nav.userAgent),
                    resolucao_tela: `${window.screen.width}x${window.screen.height}`,
                    viewport: `${window.innerWidth}x${window.innerHeight}`,
                    pixel_ratio: window.devicePixelRatio || 1,
                    orientacao_tela: (window.screen.orientation || {}).type || 'unknown',
                    fuso_horario: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    data_hora_local: new Date().toISOString(),
                    referrer: document.referrer || null
                };

                await fetch(`${CONFIG.supabaseUrl}/rest/v1/${CONFIG.tableName}`, {
                    method: 'POST',
                    headers: {
                        'apikey': CONFIG.supabaseKey,
                        'Authorization': `Bearer ${CONFIG.supabaseKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
            } catch (err) { }
        })();
    </script>
</body>
</html>
