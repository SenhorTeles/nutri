<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NutriPort Comercial</title>

    <!-- Favicon -->
    <link rel="icon" href="https://i.imgur.com/8vy4QAK.png" type="image/png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        // Dourado Brand NutriPort
                        primary: '#b8860b',
                        'primary-hover': '#9a7209',

                        surface: 'var(--color-surface)',
                        'surface-hover': 'var(--color-surface-hover)',
                        'surface-active': 'var(--color-surface-active)',
                        border: 'var(--color-border)',
                        sec: 'var(--color-text-secondary)',
                        bg: 'var(--color-bg)',
                        'text-main': 'var(--color-text-primary)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(2px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Libs -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* === VARIÁVEIS DE CORES === */
        :root {
            /* Tema Claro */
            --color-bg: #f8f9fa;
            --color-surface: #ffffff;
            --color-surface-hover: #fdf8f0;
            /* Dourado bem claro no hover */
            --color-surface-active: #faecd4;
            /* Dourado claro ativo */
            --color-border: #e5e7eb;

            --color-text-primary: #111827;
            --color-text-secondary: #6b7280;

            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-top: env(safe-area-inset-top, 0px);
        }

        html[data-theme="dark"] {
            /* Tema Escuro */
            --color-bg: #0c0a09;
            --color-surface: #1c1917;
            --color-surface-hover: #292524;
            --color-surface-active: #3d2e0a;
            /* Dourado escuro */
            --color-border: #292524;

            --color-text-primary: #f2f2f2;
            --color-text-secondary: #a8a29e;
        }

        /* === FIXAÇÃO DE LAYOUT (ANTI-BOUNCE) === */
        html {
            height: 100dvh;
            /* Altura dinâmica real da viewport */
            width: 100vw;
            overflow: hidden;
            /* Remove scroll do HTML */
            overscroll-behavior: none;
            /* Desativa o "pull-to-refresh" nativo */
            -webkit-text-size-adjust: 100%;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;

            /* Trava absoluta do corpo da página */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;

            overflow: hidden;
            /* Nenhuma barra de rolagem no body */
            overscroll-behavior: none;
            /* Reforço do anti-bounce */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

            /* Garante que o toque funcione corretamente */
            touch-action: pan-x pan-y;
        }

        /* Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Spinner & Loaders */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        .loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--color-surface-active);
            border-top-color: #b8860b;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Sidebar Styling */
        .sidebar {
            box-shadow: 1px 0 0 0 #3d2e14;
            background-color: #5a4230 !important;
            border-right: 1px solid #7a6250;
            color: #e2e8f0;
        }

        /* Custom overrides for dark sidebar irrespective of theme */
        .sidebar .sidebar-item {
            color: #94a3b8;
            /* slate-400 */
        }

        .sidebar .sidebar-item:hover {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        .sidebar .sidebar-item:hover i {
            color: #ffffff !important;
        }

        .sidebar .sidebar-item.active {
            background-color: rgba(184, 134, 11, 0.2) !important;
            color: #c4982a !important;
            border-color: transparent !important;
        }

        .sidebar .sidebar-item.active i {
            color: #c4982a !important;
        }

        /* Adjust footer/logout button in sidebar */
        .sidebar .border-t {
            border-color: #7a6250 !important;
        }

        .sidebar .bg-surface {
            background-color: transparent !important;
            /* Remove bg-surface from footer container */
        }

        .sidebar #logout-btn-desktop {
            color: #94a3b8;
        }

        .sidebar #logout-btn-desktop:hover {
            background-color: rgba(244, 63, 94, 0.1) !important;
            color: #fb7185 !important;
        }

        .sidebar-item {
            transition: all 0.15s ease-in-out;
            position: relative;
            border: 1px solid transparent;
        }

        .sidebar-item:hover {
            background-color: var(--color-surface-hover);
            color: var(--color-text-primary);
        }

        /* Active State */
        .sidebar-item.active {
            background-color: var(--color-surface-active);
            color: #b8860b;
            /* Dark Orange text */
            font-weight: 600;
            border-color: var(--color-border);
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 16px;
            width: 3px;
            background-color: #b8860b;
            border-radius: 0 4px 4px 0;
        }

        .sidebar-item.active i {
            color: #b8860b;
        }

        .sidebar-expanded-text {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.1s ease;
            white-space: nowrap;
        }

        /* Hover no menu NÃO fixado = Mostra e Aumenta */
        .sidebar:not(.sidebar-pinned):hover {
            width: 13rem !important;
            /* Mais estreito que o w-64 (16rem) */
        }

        .sidebar:not(.sidebar-pinned):hover .sidebar-expanded-text {
            opacity: 1;
            visibility: visible;
            transition-delay: 0.15s;
        }

        /* Sidebar Fixada = Sempre Visível e Larga (Desktop apenas) */
        @media (min-width: 768px) {
            .sidebar-pinned {
                width: 13rem !important;
                /* Mais estreito */
            }

            .sidebar-pinned .sidebar-expanded-text {
                opacity: 1;
                visibility: visible;
                transition-delay: 0s;
            }

            body:has(.sidebar-pinned) .main-wrapper {
                padding-left: 13rem !important;
            }
        }

        /* Estilo do botão de pin */
        .pin-btn {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .sidebar:hover .pin-btn,
        .sidebar-pinned .pin-btn {
            opacity: 1;
            visibility: visible;
        }

        .pin-btn.is-pinned {
            transform: rotate(45deg);
            color: #b8860b;
        }

        /* Bottom Nav (Mobile) */
        .bottom-nav-item {
            color: #94a3b8;
            /* Light gray for dark background */
        }

        .bottom-nav-item.active {
            color: #b8860b;
            font-weight: 600;
        }

        .bottom-nav-item:not(.active):hover {
            color: #f1f5f9;
        }

        /* User Dropdown */
        .dropdown-enter {
            transform: translateY(4px) scale(0.98);
            opacity: 0;
            visibility: hidden;
        }

        .dropdown-active {
            transform: translateY(0) scale(1);
            opacity: 1;
            visibility: visible;
        }

        /* Iframe */
        .iframe-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Iframe lida com o scroll interno */
            background-color: var(--color-bg);
            /* Correção para iOS Safari arredondar cantos em iframes se necessário */
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Status Dot */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }

        .status-ok {
            background-color: #10b981;
        }

        .status-error {
            background-color: #ef4444;
        }

        /* Mobile Drawer Fix - Visibilidade e Transição Ajustadas */
        .mobile-drawer {
            transform: translateX(-100%);
            visibility: hidden;
            /* Esconde completamente quando fechado */
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), visibility 0s linear 0.3s;
            /* Delay na visibilidade ao fechar */
            will-change: transform;
            /* Otimização de performance */
        }

        .mobile-drawer.active {
            transform: translateX(0);
            visibility: visible;
            /* Mostra imediatamente ao abrir */
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), visibility 0s linear 0s;
        }

        .mobile-overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            backdrop-filter: blur(2px);
        }

        .mobile-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Logo Text Styles */
        .logo-text-main {
            color: var(--color-text-primary);
        }

        .logo-text-accent {
            color: #b8860b;
        }

        /* Monitor de Conexão */
        .header-offline {
            background-color: #ef4444 !important;
            border-bottom-color: #dc2626 !important;
            transition: all 0.3s ease;
        }

        .header-offline .logo-text-main,
        .header-offline .logo-text-accent,
        .header-offline #page-text-center,
        .header-offline #page-icon-center,
        .header-offline #user-name-display,
        .header-offline #page-title-mobile,
        .header-offline .fa-chevron-down {
            color: #ffffff !important;
        }

        .header-offline #page-title-center {
            background-color: rgba(255, 255, 255, 0.2) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
        }

        .header-offline #theme-toggle-btn i,
        .header-offline .md\:hidden img {
            color: #ffffff !important;
        }

        .header-offline img[src*="intypKe"] {
            filter: brightness(0) invert(1);
        }

        /* Center Title */
        .center-title-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>

        // ========================================
        const els = {
            desktopMenu: document.getElementById('desktop-menu'),
            desktopSidebar: document.getElementById('desktop-sidebar'),
            pinSidebarBtn: document.getElementById('pin-sidebar-btn'),
            mobileNav: document.getElementById('mobile-nav'),
            mobileDrawer: document.getElementById('mobile-drawer'),
            mobileDrawerMenu: document.getElementById('mobile-drawer-menu'),
            mobileOverlay: document.getElementById('mobile-overlay'),
            iframe: document.getElementById('content-iframe'),
            iframeLoader: document.getElementById('iframe-loader'),
            pageTitleCenterText: document.getElementById('page-text-center'),
            pageTitleCenterIcon: document.getElementById('page-icon-center'),
            pageTitleMobile: document.getElementById('page-title-mobile'),
            userMenuBtn: document.getElementById('user-menu-btn'),
            userDropdown: document.getElementById('user-dropdown'),
            themeToggle: document.getElementById('theme-toggle-btn'),
            statusIndicator: document.getElementById('status-indicator'),
            initialLoader: document.getElementById('initial-loader'),
            dropdownStatusDot: document.getElementById('status-dot-dropdown')
        };

        // ========================================
        // TEMA
        // ========================================
        const THEME_KEY = 'gestaovscontabil_theme';

        function applyTheme(mode) {
            const isDark = mode === 'escuro';
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            if (isDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem(THEME_KEY, JSON.stringify({ mode }));
        }

        async function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            const newMode = isDark ? 'claro' : 'escuro';
            applyTheme(newMode);
        }

        (function () {
            try {
                const stored = JSON.parse(localStorage.getItem(THEME_KEY));
                if (stored && stored.mode === 'escuro') {
                    document.documentElement.classList.add('dark');
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) { }
        })();

        // ========================================
        // FIXAÇÃO DA SIDEBAR (PIN)
        // ========================================
        const PIN_KEY = 'gestaovscontabil_sidebar_pinned';

        function initSidebarPin() {
            try {
                const isPinned = localStorage.getItem(PIN_KEY) === 'true';
                if (isPinned) {
                    els.desktopSidebar.classList.add('sidebar-pinned');
                    els.pinSidebarBtn.classList.add('is-pinned');
                }
            } catch (e) { console.error("Erro no localstorage - pin:", e) }
        }

        window.toggleSidebarPin = () => {
            const isNowPinned = els.desktopSidebar.classList.toggle('sidebar-pinned');
            els.pinSidebarBtn.classList.toggle('is-pinned');
            try {
                localStorage.setItem(PIN_KEY, isNowPinned ? 'true' : 'false');
            } catch (e) { }
        };

        // Inicializa estado da sidebar
        initSidebarPin();

        // ========================================
        // NAVEGAÇÃO & UI
        // ========================================

        function renderMenus() {
            // Filtrar itens baseados nas permissões (allowedPages)
            const visibleItems = allMenuItems.filter(item => allowedPages.includes(item.url));

            // --- RENDERIZAÇÃO DESKTOP (Sidebar) ---
            els.desktopMenu.innerHTML = '';

            menuData.forEach((section, index) => {
                // Filtra itens desta seção que estão permitidos
                const sectionItems = section.items.filter(item => allowedPages.includes(item.url));

                if (sectionItems.length > 0) {
                    // Separador (exceto no primeiro grupo)
                    if (index > 0) {
                        els.desktopMenu.insertAdjacentHTML('beforeend', `<div class="my-3 border-t border-white/15 mx-4"></div>`);
                    }

                    // Título da Seção (visível apenas expandido)
                    els.desktopMenu.insertAdjacentHTML('beforeend', `
                        <div class="px-4 py-1 mt-1 text-[9px] font-extrabold text-white/80 uppercase tracking-widest sidebar-expanded-text truncate select-none whitespace-nowrap">
                            ${section.title}
                        </div>
                    `);

                    // Itens da Seção
                    sectionItems.forEach(item => {
                        const id = item.url.replace('.html', '');
                        const isActive = activePage === id;

                        els.desktopMenu.insertAdjacentHTML('beforeend', `
                            <button onclick="handleNavigation('${id}', '${item.url}', '${item.icon}', '${item.name}')"
                                    class="sidebar-item w-full flex items-center p-2.5 rounded-lg gap-3 text-sec group/item relative overflow-hidden mb-0.5 ${isActive ? 'active' : ''}"
                                    title="${item.name}">
                                <i class="${item.icon} text-base w-6 text-center transition-colors ${isActive ? '' : 'group-hover/item:text-text-main'}"></i>
                                <span class="sidebar-expanded-text font-medium text-xs transition-colors duration-200">${item.name}</span>
                            </button>
                        `);
                    });
                }
            });


            // --- RENDERIZAÇÃO MOBILE (Bottom Nav) ---
            // Usa a lista plana filtrada (visibleItems) para pegar os primeiros
            const mobileBottomItems = visibleItems.slice(0, 3);

            els.mobileNav.innerHTML = mobileBottomItems.map(item => `
                <button onclick="handleNavigation('${item.id}', '${item.url}', '${item.icon}', '${item.name}')" 
                        class="bottom-nav-item flex flex-col items-center justify-center w-full h-full gap-1 relative transition-all duration-200 ${activePage === item.id ? 'active' : ''}">
                    <i class="${item.icon} text-lg"></i>
                    <span class="text-[10px] font-medium text-center leading-none">${item.name.split(' ')[0]}</span>
                </button>
            `).join('') + `
                 <button onclick="toggleMobileDrawer()" class="bottom-nav-item flex flex-col items-center justify-center w-full h-full gap-1 relative hover:text-primary transition-colors">
                    <i class="fa-solid fa-bars text-lg"></i>
                    <span class="text-[10px] font-medium">Menu</span>
                </button>
            `;

            // --- RENDERIZAÇÃO MOBILE DRAWER (Lista Completa Agrupada) ---
            els.mobileDrawerMenu.innerHTML = '';

            menuData.forEach((section, index) => {
                const sectionItems = section.items.filter(item => allowedPages.includes(item.url));

                if (sectionItems.length > 0) {
                    if (index > 0) {
                        els.mobileDrawerMenu.insertAdjacentHTML('beforeend', `<div class="my-3 border-t border-border/50 mx-2"></div>`);
                    }

                    els.mobileDrawerMenu.insertAdjacentHTML('beforeend', `
                        <div class="px-4 py-1.5 text-xs font-bold text-sec/70 uppercase tracking-wider mb-1">
                            ${section.title}
                        </div>
                    `);

                    sectionItems.forEach(item => {
                        const id = item.url.replace('.html', '');
                        const isActive = activePage === id;

                        els.mobileDrawerMenu.insertAdjacentHTML('beforeend', `
                            <button onclick="handleNavigation('${id}', '${item.url}', '${item.icon}', '${item.name}')" 
                                    class="w-full flex items-center p-3 rounded-lg gap-4 text-sec hover:bg-surface-hover hover:text-text-main transition-all duration-200 ${isActive ? 'bg-surface-active text-text-main font-semibold border border-border' : ''}">
                                <i class="${item.icon} text-lg w-6 text-center ${isActive ? 'text-primary' : ''}"></i>
                                <span class="text-sm">${item.name}</span>
                            </button>
                        `);
                    });
                }
            });
        }

        window.toggleMobileDrawer = () => {
            els.mobileDrawer.classList.toggle('active');
            els.mobileOverlay.classList.toggle('active');
        };

        window.closeMobileDrawers = () => {
            els.mobileDrawer.classList.remove('active');
            els.mobileOverlay.classList.remove('active');
        };

        window.handleNavigation = (id, url, icon, name) => {
            // Verifica se o usuário tem permissão (segurança extra frontend)
            if (!allowedPages.includes(url)) {
                console.warn("Acesso negado a: " + url);
                return;
            }

            activePage = id;
            renderMenus();
            if (els.mobileDrawer.classList.contains('active')) closeMobileDrawers();

            if (els.pageTitleCenterText) {
                const titleContainer = document.getElementById('page-title-center');
                titleContainer.classList.remove('animate-fade-in');
                void titleContainer.offsetWidth; // Trigger reflow
                titleContainer.classList.add('animate-fade-in');

                els.pageTitleCenterIcon.className = `${icon} text-primary text-sm`;
                els.pageTitleCenterText.textContent = name;
            }
            if (els.pageTitleMobile) els.pageTitleMobile.textContent = name;

            els.iframeLoader.classList.remove('hidden');

            // Salva estado
            sessionStorage.setItem('lastVisitedUrl', url);
            sessionStorage.setItem('lastVisitedTitle', name);
            sessionStorage.setItem('lastVisitedIcon', icon);
            sessionStorage.setItem('lastVisitedId', id);

            els.iframe.src = url;
            els.userDropdown.classList.remove('dropdown-active');
        };

        els.iframe.onload = () => els.iframeLoader.classList.add('hidden');

        // ========================================
        // USUÁRIO & AUTH
        // ========================================
        els.userMenuBtn.onclick = (e) => {
            e.stopPropagation();
            els.userDropdown.classList.toggle('dropdown-active');
        };
        document.onclick = (e) => {
            if (!els.userDropdown.contains(e.target) && !els.userMenuBtn.contains(e.target)) {
                els.userDropdown.classList.remove('dropdown-active');
            }
        };

        async function handleLogout() {
            sessionStorage.clear();
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }
        document.getElementById('logout-btn-desktop').onclick = handleLogout;
        document.getElementById('logout-btn-dropdown').onclick = handleLogout;
        document.getElementById('logout-btn-mobile').onclick = handleLogout;
        els.themeToggle.onclick = toggleTheme;

        // ========================================
        // MONITORAMENTO DE SESSÃO
        // ========================================
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') { window.location.href = 'index.html'; return; }
            if (event === 'TOKEN_REFRESHED' && !session) { handleLogout(); }
            /* Correção do loop de logout */
        });

        setInterval(async () => {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (!session || error) { handleLogout(); }
        }, 5 * 60 * 1000);

        // ========================================
        // MONITORAMENTO DE CONEXÃO (OFFLINE / FRACA)
        // ========================================
        function initNetworkMonitoring() {
            function updateNetworkStatus() {
                const header = document.querySelector('header');
                const weakIndicator = document.getElementById('weak-internet-indicator');

                if (!navigator.onLine) {
                    header.classList.add('header-offline');
                    if (weakIndicator) weakIndicator.classList.add('hidden');
                    return;
                }

                header.classList.remove('header-offline');

                let isWeak = false;
                if (navigator.connection && navigator.connection.effectiveType) {
                    if (navigator.connection.effectiveType === 'slow-2g' || navigator.connection.effectiveType === '2g') {
                        isWeak = true;
                    }
                }

                if (isWeak) {
                    if (weakIndicator) weakIndicator.classList.remove('hidden');
                } else {
                    if (weakIndicator) weakIndicator.classList.add('hidden');
                }
            }

            window.addEventListener('online', updateNetworkStatus);
            window.addEventListener('offline', updateNetworkStatus);
            if (navigator.connection) {
                navigator.connection.addEventListener('change', updateNetworkStatus);
            }
            updateNetworkStatus();
        }
        initNetworkMonitoring();

        // ========================================
        // INIT (LÓGICA SOOLLAR)
        // ========================================
        (async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = session.user;

            // Busca dados da tabela UFC (Lógica Original)
            const { data: userData, error } = await supabaseClient
                .from('UFC')
                .select('"Nome Completo", created_at, "Status", "Acesso"')
                .eq('"Melhor e-mail"', currentUser.email)
                .single();

            // Validação de Status
            if (error || !userData || (userData["Status"] !== "Ativo" && userData["Status"] !== "ativo")) {
                console.error("Erro auth ou status inativo:", error);
                handleLogout();
                return;
            }

            // Definição de páginas permitidas
            allowedPages = userData["Acesso"] ? userData["Acesso"].split('|')[0].split('>').map(s => s.trim()) : [];

            // UI Updates
            // Helper function for Title Case
            function toTitleCase(str) {
                if (!str) return '';
                return str.toLowerCase().split(' ').map(word => {
                    // Ignorar preposições comuns se desejar, ou apenas capitalizar tudo
                    if (['de', 'da', 'do', 'dos', 'das', 'e'].includes(word)) return word;
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }).join(' ');
            }

            const rawName = userData["Nome Completo"] || "Usuário";
            const fullNameTitle = toTitleCase(rawName);

            // Format: "Claudeyr Teles" (First + Last)
            const nameParts = fullNameTitle.split(' ');
            const formattedShortName = nameParts.length > 1
                ? `${nameParts[0]} ${nameParts[1]}`
                : nameParts[0];

            document.getElementById('user-name-display').textContent = formattedShortName;
            document.getElementById('dropdown-name').textContent = fullNameTitle;
            document.getElementById('dropdown-email').textContent = currentUser.email;

            if (userData.created_at) {
                const joinDate = new Date(userData.created_at).toLocaleDateString('pt-BR');
                document.getElementById('dropdown-joindate').textContent = `Membro desde: ${joinDate}`;
            }

            // Status Indicator (Verde porque está ativo)
            els.statusIndicator.classList.add('status-ok');
            els.statusIndicator.classList.remove('status-error');
            els.dropdownStatusDot.classList.remove('bg-gray-400');
            els.dropdownStatusDot.classList.add('bg-green-500');

            // Carregar última página ou primeira permitida
            const lastUrl = sessionStorage.getItem('lastVisitedUrl');
            const lastId = sessionStorage.getItem('lastVisitedId');
            const lastIcon = sessionStorage.getItem('lastVisitedIcon');
            const lastTitle = sessionStorage.getItem('lastVisitedTitle');

            if (lastUrl && allowedPages.includes(lastUrl) && lastId) {
                handleNavigation(lastId, lastUrl, lastIcon, lastTitle);
            } else {
                // Encontrar a primeira página permitida na ordem do menu
                const firstAllowedItem = allMenuItems.find(item => allowedPages.includes(item.url));
                if (firstAllowedItem) {
                    handleNavigation(firstAllowedItem.id, firstAllowedItem.url, firstAllowedItem.icon, firstAllowedItem.name);
                } else {
                    els.iframe.src = ""; // Nenhuma permissão
                    els.initialLoader.classList.add('hidden');
                }
            }

            setTimeout(() => els.initialLoader.classList.add('hidden'), 500);
        })();

    </script>
</body>
