<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações da Conta - NutriPort Comercial</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* === PALETA DE CORES PROFISSIONAL (VERDE) === */
        :root {
            --color-bg: #f8fafc;
            /* slate-50 */
            --color-surface: #ffffff;
            --color-border: #e2e8f0;
            /* slate-200 */
            --color-text-primary: #0f172a;
            /* slate-900 */
            --color-text-secondary: #64748b;
            /* slate-500 */
            --color-text-tertiary: #94a3b8;
            /* slate-400 */
            --color-surface-hover: #f1f5f9;
            /* slate-100 */
            --color-primary: #b8860b;
            /* gold */
            --color-primary-hover: #9a7209;
            /* gold-hover */
            --color-primary-text: #ffffff;
            --color-primary-focus-ring: rgba(184, 134, 11, 0.3);
        }

        html[data-theme="dark"] {
            --color-bg: #0b1120;
            /* Um azul quase preto para mais contraste */
            --color-surface: #1e293b;
            /* slate-800 */
            --color-border: #334155;
            /* slate-700 */
            --color-text-primary: #f1f5f9;
            /* slate-100 */
            --color-text-secondary: #94a3b8;
            /* slate-400 */
            --color-text-tertiary: #64748b;
            /* slate-500 */
            --color-surface-hover: #293548;
            --color-primary: #c4982a;
            /* gold-500 */
            --color-primary-hover: #b8860b;
            /* gold-600 */
            --color-primary-focus-ring: rgba(184, 134, 11, 0.4);
        }

        /* === CONTROLE DE VISIBILIDADE E CARREGAMENTO === */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            transition: background-color 0.3s, color 0.3s;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body.loaded {
            opacity: 1;
        }

        .loader-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            z-index: 9999;
            transition: opacity 0.3s ease-in-out;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--color-border);
            border-bottom-color: var(--color-primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* === ESTILOS DE COMPONENTES REFINADOS === */
        .settings-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -1px rgb(0 0 0 / 0.04);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .settings-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.07), 0 4px 6px -2px rgb(0 0 0 / 0.05);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
        }

        /* flex-grow faz o corpo crescer para alinhar os rodapés */
        .card-footer {
            padding: 1.25rem 1.5rem;
            background-color: var(--color-bg);
            border-top: 1px solid var(--color-border);
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            display: block;
            width: 100%;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            border-radius: 0.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            padding: 0.625rem 0.875rem;
            font-size: 0.9rem;
        }

        .form-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-input:disabled {
            background-color: var(--color-surface-hover);
            color: var(--color-text-secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-focus-ring);
            outline: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.125rem;
            font-weight: 600;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-primary-text);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--color-primary-hover);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--color-surface);
            color: var(--color-text-primary);
            border-color: var(--color-border);
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--color-surface-hover);
        }

        .form-message {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .form-message.show {
            opacity: 1;
        }

        .form-message.success {
            color: #16a34a;
        }

        html[data-theme="dark"] .form-message.success {
            color: #4ade80;
        }

        .form-message.error {
            color: #dc2626;
        }

        html[data-theme="dark"] .form-message.error {
            color: #f87171;
        }
    </style>

    <script>
        (function () {
            const THEME_KEY = 'gestaovscontabil_theme';
            try {
                const storedTheme = localStorage.getItem(THEME_KEY);
                if (storedTheme) {
                    const theme = JSON.parse(storedTheme);
                    if (theme.mode === 'escuro') { document.documentElement.setAttribute('data-theme', 'dark'); }
                }
            } catch (e) { console.error('Erro ao carregar tema do localStorage:', e); }
        })();
    </script>
</head>

<body class="p-4 sm:p-6 lg:p-8">

    <div id="loader" class="loader-container">
        <div class="loader"></div>
    </div>

    <div class="max-w-7xl mx-auto">

        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight">Configurações da Conta</h1>
            <p class="mt-2 text-lg" style="color: var(--color-text-secondary);">Gerencie suas informações pessoais e
                segurança.</p>
        </header>

        <!-- Layout em Grid que se adapta ao tamanho da tela -->
        <main class="grid grid-cols-1 lg:grid-cols-2 lg:gap-12 gap-8">

            <!-- COLUNA 1: PERFIL PESSOAL -->
            <section id="panel-perfil" class="settings-card">
                <form id="profile-form" novalidate class="flex flex-col h-full">
                    <header class="card-header">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-user-circle text-2xl w-8 text-center"
                                style="color: var(--color-primary);"></i>
                            <div>
                                <h2 class="text-xl font-semibold">Perfil Pessoal</h2>
                                <p class="mt-1 text-sm" style="color: var(--color-text-secondary);">Suas informações de
                                    identificação.</p>
                            </div>
                        </div>
                    </header>
                    <div class="card-body">
                        <div class="space-y-6">
                            <div><label for="nome-completo" class="form-label">Nome Completo</label><input type="text"
                                    id="nome-completo" required placeholder="Carregando..." class="form-input" disabled>
                            </div>
                            <div><label for="cpf-cnpj" class="form-label">CPF/CNPJ</label><input type="text"
                                    id="cpf-cnpj" required placeholder="Carregando..." class="form-input" disabled>
                            </div>
                            <div><label for="email" class="form-label">E-mail</label><input type="email" id="email"
                                    placeholder="Carregando..." class="form-input" disabled></div>
                            <div><label for="telefone" class="form-label">Telefone</label><input type="tel"
                                    id="telefone" required placeholder="Carregando..." class="form-input" disabled>
                            </div>
                        </div>
                    </div>
                    <footer class="card-footer mt-auto flex justify-between items-center flex-wrap gap-4">
                        <div id="profile-message" class="form-message"></div>
                        <div class="flex items-center gap-3 ml-auto">
                            <button type="button" id="profile-cancel-button"
                                class="btn btn-secondary hidden">Cancelar</button>
                            <button type="submit" id="profile-save-button" class="btn btn-primary hidden"><i
                                    id="profile-save-spinner"
                                    class="fa-solid fa-spinner fa-spin mr-2 hidden"></i><span>Salvar</span></button>
                            <button type="button" id="profile-edit-button" class="btn btn-primary">Editar
                                Perfil</button>
                        </div>
                    </footer>
                </form>
            </section>

            <!-- COLUNA 2: ACESSO E SEGURANÇA -->
            <section id="panel-seguranca" class="settings-card">
                <form id="security-form" novalidate class="flex flex-col h-full">
                    <header class="card-header">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-shield-halved text-2xl w-8 text-center"
                                style="color: var(--color-primary);"></i>
                            <div>
                                <h2 class="text-xl font-semibold">Acesso e Segurança</h2>
                                <p class="mt-1 text-sm" style="color: var(--color-text-secondary);">Proteja sua conta.
                                </p>
                            </div>
                        </div>
                    </header>
                    <div class="card-body">
                        <div class="space-y-6">
                            <div><label for="nova-senha" class="form-label">Nova Senha</label><input type="password"
                                    id="nova-senha" placeholder="••••••••" class="form-input" required minlength="6">
                            </div>
                            <div><label for="confirmar-senha" class="form-label">Confirmar Nova Senha</label><input
                                    type="password" id="confirmar-senha" placeholder="••••••••" class="form-input"
                                    required></div>
                        </div>
                    </div>
                    <footer class="card-footer mt-auto flex justify-between items-center flex-wrap gap-4">
                        <div id="security-message" class="form-message"></div>
                        <button type="submit" id="password-save-button" class="btn btn-primary ml-auto"><i
                                id="password-save-spinner"
                                class="fa-solid fa-spinner fa-spin mr-2 hidden"></i><span>Atualizar
                                Senha</span></button>
                    </footer>
                </form>
            </section>

        </main>
    </div>

    <script type="module">
        // === CONFIGURAÇÃO SUPABASE ===
        const SUPABASE_URL = 'https://jmcwiszplkjksdvqyhbw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptY3dpc3pwbGtqa3NkdnF5aGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODczODIsImV4cCI6MjA5MTE2MzM4Mn0.G85OrkSFtjTXmaHvEPBkWXZQQbDKsjMBD97_V3Z6yw0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // === CONSTANTES E VARIÁVEIS GLOBAIS ===
        const THEME_KEY = 'gestaovscontabil_theme';
        let userSession = null;
        let originalProfileData = {};

        // === MAPEAMENTO DA UI (User Interface) ===
        const ui = {
            loader: document.getElementById('loader'),
            body: document.body,
            profile: {
                form: document.getElementById('profile-form'),
                inputs: {
                    nome_completo: document.getElementById('nome-completo'),
                    cpf_cnpj: document.getElementById('cpf-cnpj'),
                    email: document.getElementById('email'),
                    telefone: document.getElementById('telefone')
                },
                editButton: document.getElementById('profile-edit-button'),
                saveButton: document.getElementById('profile-save-button'),
                cancelButton: document.getElementById('profile-cancel-button'),
                spinner: document.getElementById('profile-save-spinner'),
                message: document.getElementById('profile-message'),
            },
            security: {
                form: document.getElementById('security-form'),
                inputs: {
                    nova_senha: document.getElementById('nova-senha'),
                    confirmar_senha: document.getElementById('confirmar-senha')
                },
                saveButton: document.getElementById('password-save-button'),
                spinner: document.getElementById('password-save-spinner'),
                message: document.getElementById('security-message'),
            }
        };

        // === FUNÇÕES UTILITÁRIAS ===
        function showFormMessage(element, message, type = 'success') {
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-times-circle';
            element.innerHTML = `<i class="fa-solid ${icon}"></i><span>${message}</span>`;
            element.className = `form-message ${type} show`;
            setTimeout(() => { element.classList.remove('show'); }, 5000);
        }

        function toggleProfileEditMode(isEditing) {
            ui.profile.editButton.classList.toggle('hidden', isEditing);
            ui.profile.saveButton.classList.toggle('hidden', !isEditing);
            ui.profile.cancelButton.classList.toggle('hidden', !isEditing);

            // Habilita apenas os campos que devem ser editáveis
            ui.profile.inputs.nome_completo.disabled = !isEditing;
            ui.profile.inputs.cpf_cnpj.disabled = !isEditing;
            ui.profile.inputs.telefone.disabled = !isEditing;

            if (isEditing) {
                ui.profile.inputs.nome_completo.focus();
            } else {
                ui.profile.message.classList.remove('show');
            }
        }

        // === FUNÇÕES DE CARREGAMENTO DE DADOS ===
        async function loadThemeSettings() {
            if (!userSession) return;
            try {
                const { data } = await supabase.from('configtema').select('theme_mode').eq('user_id', userSession.user.id).single();
                const themeMode = data?.theme_mode || 'claro';
                document.documentElement.setAttribute('data-theme', themeMode === 'escuro' ? 'dark' : '');
                localStorage.setItem(THEME_KEY, JSON.stringify({ mode: themeMode }));
            } catch (error) {
                console.error("Erro ao carregar tema:", error);
            }
        }

        async function loadUserData() {
            try {
                const { data, error } = await supabase.from('UFC').select('*').eq('Melhor e-mail', userSession.user.email).single();
                if (error) throw error;

                if (data) {
                    originalProfileData = {
                        'Nome Completo': data['Nome Completo'] || '',
                        'CPF/CNPJ': data['CPF/CNPJ'] || '',
                        'Telefone': data['Telefone'] || ''
                    };
                    ui.profile.inputs.email.value = data['Melhor e-mail'] || '';
                    ui.profile.inputs.nome_completo.value = originalProfileData['Nome Completo'];
                    ui.profile.inputs.cpf_cnpj.value = originalProfileData['CPF/CNPJ'];
                    ui.profile.inputs.telefone.value = originalProfileData['Telefone'];
                }
            } catch (error) {
                console.error('Erro ao carregar dados do usuário:', error);
                showFormMessage(ui.profile.message, 'Falha ao carregar seus dados.', 'error');
            }
        }

        // === MANIPULADORES DE EVENTOS (HANDLERS) ===
        async function handleProfileSubmit(event) {
            event.preventDefault();
            ui.profile.saveButton.disabled = true;
            ui.profile.spinner.classList.remove('hidden');

            const updates = {
                'Nome Completo': ui.profile.inputs.nome_completo.value.trim(),
                'CPF/CNPJ': ui.profile.inputs.cpf_cnpj.value.trim(),
                'Telefone': ui.profile.inputs.telefone.value.trim()
            };
            const { error } = await supabase.from('UFC').update(updates).eq('Melhor e-mail', userSession.user.email);

            ui.profile.saveButton.disabled = false;
            ui.profile.spinner.classList.add('hidden');

            if (error) {
                showFormMessage(ui.profile.message, 'Erro ao salvar alterações.', 'error');
            } else {
                showFormMessage(ui.profile.message, 'Perfil atualizado!', 'success');
                originalProfileData = { ...updates };
                toggleProfileEditMode(false);
            }
        }

        async function handlePasswordSubmit(event) {
            event.preventDefault();
            const newPassword = ui.security.inputs.nova_senha.value;
            const confirmPassword = ui.security.inputs.confirmar_senha.value;

            if (!newPassword || newPassword.length < 6) {
                return showFormMessage(ui.security.message, 'A senha deve ter no mínimo 6 caracteres.', 'error');
            }
            if (newPassword !== confirmPassword) {
                return showFormMessage(ui.security.message, 'As senhas não coincidem.', 'error');
            }

            ui.security.saveButton.disabled = true;
            ui.security.spinner.classList.remove('hidden');
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            ui.security.saveButton.disabled = false;
            ui.security.spinner.classList.add('hidden');

            if (error) {
                showFormMessage(ui.security.message, `Erro: ${error.message}`, 'error');
            } else {
                showFormMessage(ui.security.message, 'Senha alterada com sucesso!', 'success');
                ui.security.form.reset();
            }
        }

        // === FUNÇÃO DE INICIALIZAÇÃO ===
        async function init() {
            const { data, error } = await supabase.auth.getSession();
            if (error || !data.session) {
                window.location.href = "/index.html";
                return;
            }
            userSession = data.session;

            await Promise.all([loadUserData(), loadThemeSettings()]);

            ui.profile.form.addEventListener('submit', handleProfileSubmit);
            ui.profile.editButton.addEventListener('click', () => toggleProfileEditMode(true));
            ui.profile.cancelButton.addEventListener('click', () => {
                ui.profile.inputs.nome_completo.value = originalProfileData['Nome Completo'];
                ui.profile.inputs.cpf_cnpj.value = originalProfileData['CPF/CNPJ'];
                ui.profile.inputs.telefone.value = originalProfileData['Telefone'];
                toggleProfileEditMode(false);
            });
            ui.security.form.addEventListener('submit', handlePasswordSubmit);

            toggleProfileEditMode(false);

            ui.loader.style.opacity = '0';
            setTimeout(() => {
                ui.loader.style.display = 'none';
                ui.body.classList.add('loaded');
            }, 300);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>
